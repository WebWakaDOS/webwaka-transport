name = "webwaka-transport-api"
main = "src/worker.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# ============================================================
# P15-T2: Durable Objects — Real-Time Seat Updates
# ============================================================
[[durable_objects.bindings]]
name = "TRIP_SEAT_DO"
class_name = "TripSeatDO"

[[migrations]]
tag = "v1"
new_classes = ["TripSeatDO"]

# ============================================================
# P15-T4: R2 Bucket — Operator Branding Assets
# ============================================================
[[r2_buckets]]
binding = "ASSETS_R2"
bucket_name = "webwaka-operator-assets"

# ============================================================
# Cron Triggers — Scheduled Worker
# "* * * * *"    — every minute: drainEventBus, sweepExpiredReservations, sweepAbandonedBookings
# "0 0 * * *"    — daily at UTC midnight: NDPR sweepExpiredPII + purgeExpiredFinancialData (C-002)
# ============================================================
[triggers]
crons = ["* * * * *", "0 0 * * *"]

# ============================================================
# Local development (wrangler dev)
# Uses .dev.vars for secrets; no real D1/KV needed for unit tests
# ============================================================

# ============================================================
# Staging environment
# ============================================================
[env.staging]
name = "webwaka-transport-api-staging"

[env.staging.triggers]
crons = ["* * * * *", "0 0 * * *"]

[[env.staging.d1_databases]]
binding = "DB"
database_name = "webwaka-transport-db-staging"
database_id = "b687d819-f83b-4d54-95ac-f123500aaae4"

[[env.staging.kv_namespaces]]
binding = "SESSIONS_KV"
id = "bde8befc71da40c5a5979ee35830022a"

[[env.staging.kv_namespaces]]
binding = "TENANT_CONFIG_KV"
id = "placeholder-tenant-config-staging"

[[env.staging.kv_namespaces]]
binding = "SEAT_CACHE_KV"
id = "placeholder-seat-cache-staging"

[[env.staging.kv_namespaces]]
binding = "IDEMPOTENCY_KV"
id = "placeholder-idempotency-staging"

# ============================================================
# Production environment
# ============================================================
[env.production]
name = "webwaka-transport-api-prod"

[env.production.triggers]
crons = ["* * * * *", "0 0 * * *"]

[[env.production.d1_databases]]
binding = "DB"
database_name = "webwaka-transport-db-prod"
database_id = "1faa6600-d4ce-4c1c-9868-ec23566da100"

[[env.production.kv_namespaces]]
binding = "SESSIONS_KV"
id = "f176cebbdf8445838c72d9fde0173628"

[[env.production.kv_namespaces]]
binding = "TENANT_CONFIG_KV"
id = "placeholder-tenant-config-prod"

[[env.production.kv_namespaces]]
binding = "SEAT_CACHE_KV"
id = "placeholder-seat-cache-prod"

[[env.production.kv_namespaces]]
binding = "IDEMPOTENCY_KV"
id = "placeholder-idempotency-prod"
