name = "webwaka-transport-api"
main = "src/worker.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# ============================================================
# P15-T2: Durable Objects — Real-Time Seat Updates
# ============================================================
[[durable_objects.bindings]]
name = "TRIP_SEAT_DO"
class_name = "TripSeatDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["TripSeatDO"]

# ============================================================
# P15-T4: R2 Bucket — Operator Branding Assets
# ============================================================
[[r2_buckets]]
binding = "ASSETS_R2"
bucket_name = "webwaka-operator-assets"

# ============================================================
# Cron Triggers — Scheduled Worker
# "* * * * *"    — every minute: drainEventBus, sweepExpiredReservations, sweepAbandonedBookings
# "0 0 * * *"    — daily at UTC midnight: NDPR sweepExpiredPII + purgeExpiredFinancialData (C-002)
# ============================================================
[triggers]
crons = ["* * * * *", "0 0 * * *"]

# ============================================================
# Local development (wrangler dev)
# Uses .dev.vars for secrets; no real D1/KV needed for unit tests
# ============================================================

# ============================================================
# Production environment
# ============================================================
[env.production]
name = "webwaka-transport-api-prod"

[env.production.triggers]
crons = ["* * * * *", "0 0 * * *"]

# ============================================================
# P15-T2: Durable Objects — Real-Time Seat Updates (production)
# ============================================================
[[env.production.durable_objects.bindings]]
name = "TRIP_SEAT_DO"
class_name = "TripSeatDO"

[[env.production.migrations]]
tag = "v1"
new_sqlite_classes = ["TripSeatDO"]

# ============================================================
# P15-T4: R2 Bucket — Operator Branding Assets (production)
# ============================================================
[[env.production.r2_buckets]]
binding = "ASSETS_R2"
bucket_name = "webwaka-operator-assets"


[[env.production.d1_databases]]
binding = "DB"
database_name = "webwaka-transport-db-prod"
database_id = "1faa6600-d4ce-4c1c-9868-ec23566da100"

[[env.production.kv_namespaces]]
binding = "SESSIONS_KV"
id = "f176cebbdf8445838c72d9fde0173628"

[[env.production.kv_namespaces]]
binding = "TENANT_CONFIG_KV"
id = "2100508349014672a24a7606b4c03de7"

[[env.production.kv_namespaces]]
binding = "SEAT_CACHE_KV"
id = "f02e65e56b534402a1f4d85a35e2be97"

[[env.production.kv_namespaces]]
binding = "IDEMPOTENCY_KV"
id = "cc380305413147f8ac35058bd0bcb9c0"

[[env.production.queues.producers]]
binding = "TRANSPORT_EVENTS"
queue = "webwaka-transport-events-prod"

[[env.production.queues.consumers]]
queue = "webwaka-transport-events-prod"
max_batch_size = 10
max_batch_timeout = 5
