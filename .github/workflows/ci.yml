name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test -- --run

      - name: TypeScript typecheck
        run: npx tsc --noEmit

      - name: Check for placeholder KV IDs (warn on non-production branches)
        run: |
          if grep -q "placeholder" wrangler.toml; then
            echo "WARNING: wrangler.toml contains placeholder KV IDs."
            echo "Run: bash scripts/provision-kv.sh to provision real namespaces."
          fi

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/staging' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Deploy Worker (staging)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy --env staging

      - name: Run post-deploy migrations (staging)
        continue-on-error: true
        env:
          MIGRATION_SECRET: ${{ secrets.MIGRATION_SECRET }}
          WORKER_URL_STAGING: ${{ secrets.WORKER_URL_STAGING }}
        run: |
          curl -f -X POST "$WORKER_URL_STAGING/api/admin/migrations/run" \
            -H "Authorization: Bearer $MIGRATION_SECRET" \
            -H "Content-Type: application/json" \
            --retry 3 --retry-delay 5

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fail if placeholder KV IDs in production config
        run: |
          PROD_SECTION=$(awk '/\[env\.production\]/,/^(\[|$)/' wrangler.toml)
          if echo "$PROD_SECTION" | grep -q "placeholder"; then
            echo "ERROR: Production wrangler.toml contains placeholder KV IDs."
            echo "Run: bash scripts/provision-kv.sh --env production"
            exit 1
          fi

      - name: Build frontend
        run: npm run build

      - name: Deploy Worker (production)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy --env production

      - name: Run post-deploy migrations (production)
        continue-on-error: true
        env:
          MIGRATION_SECRET: ${{ secrets.MIGRATION_SECRET }}
          WORKER_URL: ${{ secrets.WORKER_URL }}
        run: |
          curl -f -X POST "$WORKER_URL/api/admin/migrations/run" \
            -H "Authorization: Bearer $MIGRATION_SECRET" \
            -H "Content-Type: application/json" \
            --retry 3 --retry-delay 5
